<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GooCore — модульная игра</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            width: 100%;
            max-width: 900px;
        }
        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.2);
            width: 100%;
            height: auto;
            aspect-ratio: 1.6 / 1;
            background: #0f0f2a;
            cursor: pointer;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.06);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .controls kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .badge {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        @media (max-width: 600px) {
            .controls {
                font-size: 0.7rem;
                padding: 0.4rem 0.8rem;
                gap: 0.4rem 0.8rem;
            }
            .controls kbd {
                font-size: 0.65rem;
                padding: 0.05rem 0.35rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="controls">
            <span><kbd>←</kbd> <kbd>→</kbd> или <kbd>A</kbd> <kbd>D</kbd> — движение</span>
            <span><kbd>Space</kbd> <kbd>↑</kbd> <kbd>W</kbd> — прыжок</span>
            <span class="badge">⚡ <kbd>Shift</kbd>+<kbd>P</kbd> — собрать все монеты</span>
        </div>
    </div>

    <!-- ================================================================== -->
    <!--  МОДУЛЬНАЯ ИГРА  —  весь код вынесен в отдельный модуль             -->
    <!-- ================================================================== -->
    <script type="module">
        // ------------------------------------------------------------------
        // Импортируем всё из модуля. В реальном проекте это был бы отдельный
        // файл `game.js`, но для демонстрации мы определяем модуль прямо здесь.
        // ------------------------------------------------------------------
        import {
            Game,
            World,
            Player,
            Enemy,
            Camera,
            ParticleSystem,
            StarManager,
            InputManager,
            Renderer,
            CONFIG
        } from './goocore-game.js';

        // ------------------------------------------------------------------
        // ПОЛУЧАЕМ ХОЛСТ И СОЗДАЁМ ЭКЗЕМПЛЯР ИГРЫ С КАСТОМНЫМИ НАСТРОЙКАМИ
        // ------------------------------------------------------------------
        const canvas = document.getElementById('gameCanvas');

        // Можно переопределить любые параметры конфигурации
        const config = {
            ...CONFIG,
            totalCoins: 20,
            enemyCount: 10,
            tileSize: 32,
            cols: 50,
            rows: 30,
            gravity: 0.8,
            jumpSpeed: -14,
            moveSpeed: 1.2,
            maxSpeed: 9,
            friction: 0.82,
            // Цвета можно менять прямо здесь
            playerColor: {
                body: ['#7dffb3', '#1b8a4a'],
                glow: 'rgba(46,204,113,0.5)',
            },
            enemyColor: {
                body: ['#ff6666', '#cc0000'],
                glow: 'rgba(255,0,0,0.5)',
            },
            coinColor: ['#ffff88', '#ffdd44', '#ffaa00', '#cc8800'],
            blockHue: 210,
        };

        // Создаём игру
        const game = new Game(canvas, config);

        // Можно подписаться на события (например, сбор монет, победа, смерть)
        game.on('coinCollected', (count, total) => {
            console.log(`💰 Монет: ${count}/${total}`);
        });

        game.on('win', () => {
            console.log('🎉 ПОБЕДА!');
        });

        game.on('death', () => {
            console.log('💀 Игрок умер');
        });

        // Запускаем игровой цикл
        game.start();

        // ------------------------------------------------------------------
        // Для отладки — выставляем игру в глобальную область, чтобы можно
        // было экспериментировать из консоли (например, game.player.x = 10)
        // ------------------------------------------------------------------
        window.__game = game;
        console.log('✅ Игра запущена! Используйте window.__game для доступа.');
        console.log('   Например: __game.player.x = 100');
        console.log('   или: __game.config.gravity = 2');
    </script>

</body>
</html>
