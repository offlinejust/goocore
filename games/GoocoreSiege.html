<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Средневековый RPG — бой, мирные жители, эволюция врагов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            background: #0f0f1f;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            padding: 10px;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 12px;
            image-rendering: pixelated;
            background: #2d2d3f;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f0e6d3;
            font-size: 18px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.7);
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #ui span {
            background: rgba(20, 20, 30, 0.7);
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            display: inline-block;
            margin-right: 12px;
        }
        .controls {
            color: #b8a99a;
            font-size: 13px;
            margin-top: 8px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
        }
        #hpBar {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #hpBar .hp-fill {
            width: 100px;
            height: 12px;
            background: #3a2a2a;
            border-radius: 6px;
            overflow: hidden;
        }
        #hpBar .hp-fill div {
            height: 100%;
            background: #e74c3c;
            transition: width 0.2s;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="ui">
            <span id="coinDisplay">💰 0 / 20</span>
            <span id="statusDisplay">🏰</span>
            <div id="hpBar">
                <span>❤️</span>
                <div class="hp-fill"><div id="hpFill" style="width:100%"></div></div>
            </div>
            <div class="controls">WASD — ходьба, ЛКМ — атака, Пробел — рывок назад</div>
        </div>
    </div>

    <script>
        // ============================================================
        //  БИБЛИОТЕКА goocore — с мирными жителями и эволюцией врагов
        // ============================================================

        // ---------- КОНФИГУРАЦИЯ ----------
        const CONFIG = {
            tileSize: 32,
            cols: 50,
            rows: 30,
            totalCoins: 20,
            enemyCount: 8,
            civilianCount: 24, // будет вычисляться как enemyCount * 3
            playerSpeed: 3.8,
            playerSize: 24,
            enemySize: 24,
            civilianSize: 22,
            enemySpeed: 0.8,
            enemyChaseSpeed: 1.6,
            civilianSpeed: 0.7,
            civilianFleeSpeed: 1.6,
            playerHP: 5,
            enemyHP: 2,
            civilianHP: 1,
            attackCooldown: 25,
            attackDuration: 15,
            attackRange: 30,
            detectionRadius: 160,
            waterSlow: 0.5,
            colors: {
                grass: '#3d7a4a',
                road: '#8a7a6a',
                wall: '#6b4e3a',
                roof: '#b34a3a',
                wood: '#8b6b4a',
                water: '#2a7a9a',
                tree: '#2d7a3a',
                coin: '#ffd700',
                player: '#4a8ac4',
                enemy: '#c44a4a',
                civilian: '#66bb6a',
            }
        };

        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
        function random(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function dist(a, b) {
            return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function lerp(a, b, t) { return a + (b - a) * t; }

        // ---------- КЛАСС World ----------
        class World {
            constructor(config) {
                this.config = config;
                this.tileSize = config.tileSize;
                this.cols = config.cols;
                this.rows = config.rows;
                this.grid = [];
                this.coins = 0;
                this.totalCoins = config.totalCoins;
                this.seed = Date.now();
            }

            generate() {
                const { rows, cols } = this;
                this.grid = Array.from({ length: rows }, () => Array(cols).fill(0));

                for (let x = 0; x < cols; x++) {
                    this.grid[0][x] = 1;
                    this.grid[rows - 1][x] = 1;
                }
                for (let y = 0; y < rows; y++) {
                    this.grid[y][0] = 1;
                    this.grid[y][cols - 1] = 1;
                }

                const roadInterval = 6;
                for (let y = 2; y < rows - 2; y += roadInterval) {
                    for (let x = 1; x < cols - 1; x++) {
                        if (this.grid[y][x] === 0) this.grid[y][x] = 2;
                    }
                }
                for (let x = 2; x < cols - 2; x += roadInterval) {
                    for (let y = 1; y < rows - 1; y++) {
                        if (this.grid[y][x] === 0) this.grid[y][x] = 2;
                    }
                }

                for (let y = 1; y < rows - 1; y++) {
                    for (let x = 1; x < cols - 1; x++) {
                        if (this.grid[y][x] === 0) {
                            let w = random(2, 3);
                            let h = random(2, 3);
                            if (x + w < cols - 1 && y + h < rows - 1) {
                                let canBuild = true;
                                for (let dy = 0; dy < h; dy++) {
                                    for (let dx = 0; dx < w; dx++) {
                                        if (this.grid[y + dy][x + dx] !== 0) canBuild = false;
                                    }
                                }
                                if (canBuild) {
                                    for (let dy = 0; dy < h; dy++) {
                                        for (let dx = 0; dx < w; dx++) {
                                            this.grid[y + dy][x + dx] = 1;
                                        }
                                    }
                                    if (y - 1 >= 1) {
                                        for (let dx = 0; dx < w; dx++) {
                                            if (this.grid[y - 1][x + dx] === 0) {
                                                this.grid[y - 1][x + dx] = 4;
                                            }
                                        }
                                    }
                                    x += w - 1;
                                }
                            }
                        }
                    }
                }

                for (let i = 0; i < 30; i++) {
                    let x = random(1, cols - 2);
                    let y = random(1, rows - 2);
                    if (this.grid[y][x] === 0) {
                        this.grid[y][x] = 5;
                    }
                }

                for (let i = 0; i < 4; i++) {
                    let cx = random(5, cols - 6);
                    let cy = random(5, rows - 6);
                    let rad = random(2, 4);
                    for (let dy = -rad; dy <= rad; dy++) {
                        for (let dx = -rad; dx <= rad; dx++) {
                            if (dx * dx + dy * dy <= rad * rad) {
                                let nx = cx + dx,
                                    ny = cy + dy;
                                if (nx > 0 && nx < cols - 1 && ny > 0 && ny < rows - 1) {
                                    if (this.grid[ny][nx] === 0 || this.grid[ny][nx] === 2) {
                                        this.grid[ny][nx] = 6;
                                    }
                                }
                            }
                        }
                    }
                }

                this.coins = 0;
                for (let i = 0; i < this.totalCoins; i++) {
                    let attempts = 0;
                    while (attempts < 100) {
                        let x = random(1, cols - 2);
                        let y = random(1, rows - 2);
                        let tile = this.grid[y][x];
                        if (tile === 0 || tile === 2) {
                            this.grid[y][x] = 3;
                            this.coins++;
                            break;
                        }
                        attempts++;
                    }
                }
                return this.grid;
            }

            getTile(col, row) {
                if (row < 0 || row >= this.rows || col < 0 || col >= this.cols) return 1;
                return this.grid[row][col];
            }

            isBlock(col, row) {
                const t = this.getTile(col, row);
                return t === 1 || t === 4 || t === 5;
            }

            isWater(col, row) {
                return this.getTile(col, row) === 6;
            }

            isCoin(col, row) {
                return this.getTile(col, row) === 3;
            }

            collectCoin(col, row) {
                if (this.isCoin(col, row)) {
                    this.grid[row][col] = 0;
                    this.coins--;
                    return true;
                }
                return false;
            }
        }

        // ---------- БАЗОВЫЙ КЛАСС Entity ----------
        class Entity {
            constructor(x, y, w, h, config) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
                this.config = config;
                this.vx = 0;
                this.vy = 0;
                this.spawn = 0;
                this.direction = 0; // 0-вниз, 1-влево, 2-вправо, 3-вверх

                this.hp = 0;
                this.maxHp = 0;
                this.attackDamage = 1;
                this.attackRange = config.attackRange || 30;
                this.attackCooldown = config.attackCooldown || 25;
                this.attackDuration = config.attackDuration || 15;
                this.isAttacking = false;
                this.attackTimer = 0;
                this.attackCooldownTimer = 0;
                this.canAttack = true;
                this.dead = false;

                this.attackStartAngle = 0;
                this.attackEndAngle = 0;

                // Для плавного уклонения
                this.isDodging = false;
                this.dodgeTimer = 0;
                this.dodgeTargetX = 0;
                this.dodgeTargetY = 0;
                this.dodgeSpeedX = 0;
                this.dodgeSpeedY = 0;
                this.dodgeDuration = 10; // кадров
            }

            collidesWithWorld(world) {
                const t = this.config.tileSize;
                const points = [
                    { x: this.x, y: this.y },
                    { x: this.x + this.w, y: this.y },
                    { x: this.x, y: this.y + this.h },
                    { x: this.x + this.w, y: this.y + this.h },
                    { x: this.x + this.w / 2, y: this.y + this.h / 2 },
                ];
                for (let p of points) {
                    let col = Math.floor(p.x / t);
                    let row = Math.floor(p.y / t);
                    if (world.isBlock(col, row)) return true;
                }
                return false;
            }

            move(dx, dy, world) {
                const centerX = this.x + this.w / 2;
                const centerY = this.y + this.h / 2;
                const t = this.config.tileSize;
                const col = Math.floor(centerX / t);
                const row = Math.floor(centerY / t);
                let speedMul = 1;
                if (world.isWater(col, row)) {
                    speedMul = this.config.waterSlow || 0.5;
                }

                dx *= speedMul;
                dy *= speedMul;

                this.x += dx;
                if (this.collidesWithWorld(world)) {
                    this.x -= dx;
                    this.vx = 0;
                }

                this.y += dy;
                if (this.collidesWithWorld(world)) {
                    this.y -= dy;
                    this.vy = 0;
                }

                const maxX = world.cols * this.config.tileSize - this.w;
                const maxY = world.rows * this.config.tileSize - this.h;
                this.x = clamp(this.x, 0, maxX);
                this.y = clamp(this.y, 0, maxY);
            }

            // Плавный рывок назад
            dashBack(distance, world) {
                let angle;
                switch (this.direction) {
                    case 0:
                        angle = Math.PI / 2;
                        break;
                    case 1:
                        angle = Math.PI;
                        break;
                    case 2:
                        angle = 0;
                        break;
                    case 3:
                        angle = -Math.PI / 2;
                        break;
                    default:
                        angle = Math.PI / 2;
                }
                // Противоположное направление
                let dx = -Math.cos(angle) * distance;
                let dy = -Math.sin(angle) * distance;

                // Устанавливаем цель и скорость для плавного движения
                this.isDodging = true;
                this.dodgeTimer = this.dodgeDuration;
                this.dodgeTargetX = this.x + dx;
                this.dodgeTargetY = this.y + dy;
                this.dodgeSpeedX = dx / this.dodgeDuration;
                this.dodgeSpeedY = dy / this.dodgeDuration;
            }

            // Обновление уклонения (вызывается в update)
            updateDodge(world) {
                if (!this.isDodging) return false;
                this.dodgeTimer--;
                if (this.dodgeTimer <= 0) {
                    this.isDodging = false;
                    return false;
                }
                // Двигаемся к цели
                this.x += this.dodgeSpeedX;
                this.y += this.dodgeSpeedY;
                // Проверка коллизии
                if (this.collidesWithWorld(world)) {
                    this.x -= this.dodgeSpeedX;
                    this.y -= this.dodgeSpeedY;
                    // Если столкнулись, прекращаем уклонение
                    this.isDodging = false;
                    this.dodgeTimer = 0;
                }
                // Ограничение границ
                const maxX = world.cols * this.config.tileSize - this.w;
                const maxY = world.rows * this.config.tileSize - this.h;
                this.x = clamp(this.x, 0, maxX);
                this.y = clamp(this.y, 0, maxY);
                return true;
            }

            startAttack() {
                if (!this.canAttack || this.isAttacking) return false;
                this.isAttacking = true;
                this.attackTimer = this.attackDuration;
                this.canAttack = false;
                this.attackCooldownTimer = this.attackCooldown;

                let baseAngle;
                switch (this.direction) {
                    case 0:
                        baseAngle = Math.PI / 2;
                        break;
                    case 1:
                        baseAngle = Math.PI;
                        break;
                    case 2:
                        baseAngle = 0;
                        break;
                    case 3:
                        baseAngle = -Math.PI / 2;
                        break;
                    default:
                        baseAngle = 0;
                }
                this.attackStartAngle = baseAngle - 0.6;
                this.attackEndAngle = baseAngle + 0.6;
                return true;
            }

            updateAttack() {
                if (this.attackCooldownTimer > 0) {
                    this.attackCooldownTimer--;
                    if (this.attackCooldownTimer === 0) this.canAttack = true;
                }
                if (this.isAttacking) {
                    this.attackTimer--;
                    if (this.attackTimer <= 0) {
                        this.isAttacking = false;
                        this.performAttack();
                    }
                }
            }

            performAttack() {
                // Переопределяется
            }

            takeDamage(amount) {
                this.hp -= amount;
                if (this.hp <= 0) {
                    this.hp = 0;
                    this.dead = true;
                }
            }

            intersects(other) {
                return this.x < other.x + other.w &&
                    this.x + this.w > other.x &&
                    this.y < other.y + other.h &&
                    this.y + this.h > other.y;
            }

            static resolveCollision(a, b) {
                const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
                const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
                if (overlapX <= 0 || overlapY <= 0) return;

                if (overlapX < overlapY) {
                    const sign = (a.x + a.w / 2 < b.x + b.w / 2) ? -1 : 1;
                    const shift = overlapX / 2;
                    a.x += sign * shift;
                    b.x -= sign * shift;
                } else {
                    const sign = (a.y + a.h / 2 < b.y + b.h / 2) ? -1 : 1;
                    const shift = overlapY / 2;
                    a.y += sign * shift;
                    b.y -= sign * shift;
                }
            }
        }

        // ---------- КЛАСС Player ----------
        class Player extends Entity {
            constructor(config) {
                const size = config.playerSize || 24;
                super(0, 0, size, size, config);
                this.maxHp = config.playerHP || 5;
                this.hp = this.maxHp;
                this.dead = false;
                this.respawnTimer = 0;
                this.coinCount = 0;
                this.attackDamage = 1;
                this.attackRange = config.attackRange || 30;
            }

            init(world) {
                const t = this.config.tileSize;
                for (let attempt = 0; attempt < 50; attempt++) {
                    let x = random(2, world.cols - 3) * t + 2;
                    let y = random(2, world.rows - 3) * t + 2;
                    this.x = x;
                    this.y = y;
                    if (!this.collidesWithWorld(world)) {
                        this.dead = false;
                        this.spawn = 1;
                        this.hp = this.maxHp;
                        this.coinCount = 0;
                        this.isAttacking = false;
                        this.canAttack = true;
                        this.attackCooldownTimer = 0;
                        return true;
                    }
                }
                this.x = 2 * t;
                this.y = 2 * t;
                this.dead = false;
                this.hp = this.maxHp;
                return true;
            }

            update(input, world) {
                if (this.dead) return;

                if (this.spawn > 0 && this.spawn < 1) {
                    this.spawn += 0.04;
                    if (this.spawn >= 1) this.spawn = 0;
                    return;
                }

                // Уклонение (если активно, то перекрывает движение)
                if (this.updateDodge(world)) {
                    // Во время уклонения не двигаемся и не атакуем? Можно разрешить атаку, но для простоты пропускаем.
                    // Всё равно обновляем атаку
                    this.updateAttack();
                    return;
                }

                // Движение
                let dx = 0,
                    dy = 0;
                if (input.up) dy = -this.config.playerSpeed;
                if (input.down) dy = this.config.playerSpeed;
                if (input.left) dx = -this.config.playerSpeed;
                if (input.right) dx = this.config.playerSpeed;

                if (dx !== 0 && dy !== 0) {
                    dx *= 0.707;
                    dy *= 0.707;
                }

                if (dx > 0) this.direction = 2;
                else if (dx < 0) this.direction = 1;
                else if (dy < 0) this.direction = 3;
                else if (dy > 0) this.direction = 0;

                this.move(dx, dy, world);

                // Рывок назад (пробел) — только если не уклоняемся и не атакуем
                if (input.space && !this.isAttacking && !this.dead) {
                    this.dashBack(32, world);
                    input.space = false;
                }

                // Атака (левая кнопка мыши)
                if (input.mouseLeft) {
                    this.startAttack();
                    input.mouseLeft = false;
                }
                this.updateAttack();

                // Сбор монет
                const t = this.config.tileSize;
                let cx = Math.floor((this.x + this.w / 2) / t);
                let cy = Math.floor((this.y + this.h / 2) / t);
                if (world.isCoin(cx, cy)) {
                    if (world.collectCoin(cx, cy)) {
                        this.coinCount++;
                    }
                }
            }

            performAttack() {
                if (this._game) {
                    this._game.playerAttack(this);
                }
            }
        }

        // ---------- КЛАСС Enemy ----------
        class Enemy extends Entity {
            constructor(config, world, detectionRadiusMod, speedMod) {
                const size = config.enemySize || 24;
                super(0, 0, size, size, config);
                this.maxHp = config.enemyHP || 2;
                this.hp = this.maxHp;
                this.dead = false;
                this.timer = 0;
                this.wait = random(5, 20);
                this.targetX = this.x;
                this.targetY = this.y;
                this.migrate = 0;
                // Модифицируем параметры
                this.baseSpeed = config.enemySpeed || 0.8;
                this.baseChaseSpeed = config.enemyChaseSpeed || 1.6;
                this.baseDetectionRadius = config.detectionRadius || 160;
                this.speed = this.baseSpeed * speedMod;
                this.chaseSpeed = this.baseChaseSpeed * speedMod;
                this.detectionRadius = this.baseDetectionRadius * detectionRadiusMod;
                this.attackRange = config.attackRange || 30;
                this.attackDamage = 1;
                this.state = 'idle';
                this.attackCooldown = config.attackCooldown || 25;
                this.attackDuration = config.attackDuration || 15;
                this.isAttacking = false;
                this.attackTimer = 0;
                this.attackCooldownTimer = 0;
                this.canAttack = true;
                this.dodgeCooldown = 0;
                this.findSpawn(world);
            }

            // Обновление модификаторов (при убийстве гражданского)
            updateModifiers(detectionRadiusMod, speedMod) {
                this.detectionRadius = this.baseDetectionRadius * detectionRadiusMod;
                this.speed = this.baseSpeed * speedMod;
                this.chaseSpeed = this.baseChaseSpeed * speedMod;
            }

            findSpawn(world) {
                const t = this.config.tileSize;
                for (let attempt = 0; attempt < 50; attempt++) {
                    let x = random(2, world.cols - 3) * t + 2;
                    let y = random(2, world.rows - 3) * t + 2;
                    this.x = x;
                    this.y = y;
                    if (!this.collidesWithWorld(world)) {
                        this.targetX = x;
                        this.targetY = y;
                        this.migrate = 0;
                        this.spawn = 1;
                        return true;
                    }
                }
                return false;
            }

            update(world, player) {
                if (this.dead) return;

                if (this.spawn > 0 && this.spawn < 1) {
                    this.spawn += 0.04;
                    if (this.spawn >= 1) this.spawn = 0;
                    return;
                }

                // Уклонение (плавное)
                if (this.updateDodge(world)) {
                    this.updateAttack();
                    return;
                }

                this.updateAttack();

                if (this.dodgeCooldown > 0) this.dodgeCooldown--;
                const distToPlayer = dist(this, player);
                if (player.isAttacking && distToPlayer < player.attackRange + 20 && this.dodgeCooldown === 0) {
                    // Уклоняемся в противоположную сторону
                    const angle = Math.atan2(this.y - player.y, this.x - player.x);
                    const dashDist = 32;
                    let dx = Math.cos(angle) * dashDist;
                    let dy = Math.sin(angle) * dashDist;
                    // Используем плавное уклонение
                    this.isDodging = true;
                    this.dodgeTimer = this.dodgeDuration;
                    this.dodgeTargetX = this.x + dx;
                    this.dodgeTargetY = this.y + dy;
                    this.dodgeSpeedX = dx / this.dodgeDuration;
                    this.dodgeSpeedY = dy / this.dodgeDuration;
                    this.dodgeCooldown = 30;
                }

                // Расчёт дистанции до игрока
                const dxPlayer = player.x - this.x;
                const dyPlayer = player.y - this.y;
                const distToPlayer2 = Math.hypot(dxPlayer, dyPlayer);

                let currentSpeed = this.speed;
                if (distToPlayer2 < this.detectionRadius) {
                    this.state = 'chase';
                    currentSpeed = this.chaseSpeed;
                    if (distToPlayer2 < this.attackRange + 10) {
                        this.state = 'attack';
                        if (this.canAttack && !this.isAttacking) {
                            this.startAttack();
                        }
                    }
                } else {
                    this.state = 'idle';
                }

                let dx = 0,
                    dy = 0;
                if (this.state === 'chase' || this.state === 'attack') {
                    if (this.state === 'attack' && this.isAttacking) {
                        // стоим
                    } else {
                        const len = Math.hypot(dxPlayer, dyPlayer) || 1;
                        dx = (dxPlayer / len) * currentSpeed;
                        dy = (dyPlayer / len) * currentSpeed;
                    }
                } else {
                    this.timer++;
                    if (this.timer > this.wait) {
                        this.timer = 0;
                        this.wait = random(10, 40);
                        let angle = Math.random() * Math.PI * 2;
                        let dist2 = random(40, 150);
                        let tx = this.x + Math.cos(angle) * dist2;
                        let ty = this.y + Math.sin(angle) * dist2;
                        const t = this.config.tileSize;
                        const maxX = (world.cols - 1) * t - this.w;
                        const maxY = (world.rows - 1) * t - this.h;
                        tx = clamp(tx, t, maxX);
                        ty = clamp(ty, t, maxY);
                        this.targetX = tx;
                        this.targetY = ty;
                        this.migrate = random(30, 80);
                    }
                    if (this.migrate > 0) {
                        this.migrate--;
                        let dxT = this.targetX - this.x;
                        let dyT = this.targetY - this.y;
                        let distT = Math.hypot(dxT, dyT);
                        if (distT > 2) {
                            dx = (dxT / distT) * this.speed;
                            dy = (dyT / distT) * this.speed;
                        } else {
                            this.migrate = 0;
                        }
                    }
                }

                if (dx !== 0 || dy !== 0) {
                    this.move(dx, dy, world);
                }

                if (Math.abs(dx) > Math.abs(dy)) {
                    this.direction = dx > 0 ? 2 : 1;
                } else if (Math.abs(dy) > 0) {
                    this.direction = dy > 0 ? 0 : 3;
                }
            }

            performAttack() {
                if (this._game) {
                    this._game.enemyAttack(this);
                }
            }

            takeDamage(amount) {
                this.hp -= amount;
                if (this.hp <= 0) {
                    this.hp = 0;
                    this.dead = true;
                }
            }
        }

        // ---------- КЛАСС Civilian (мирный житель) ----------
        class Civilian extends Entity {
            constructor(config, world) {
                const size = config.civilianSize || 22;
                super(0, 0, size, size, config);
                this.maxHp = config.civilianHP || 1;
                this.hp = this.maxHp;
                this.dead = false;
                this.timer = 0;
                this.wait = random(5, 20);
                this.targetX = this.x;
                this.targetY = this.y;
                this.migrate = 0;
                this.speed = config.civilianSpeed || 0.7;
                this.fleeSpeed = config.civilianFleeSpeed || 1.6;
                this.detectionRadius = config.detectionRadius || 160; // используем тот же радиус
                this.state = 'idle'; // 'idle', 'flee'
                this.spawn = 1;
                this.findSpawn(world);
            }

            findSpawn(world) {
                const t = this.config.tileSize;
                for (let attempt = 0; attempt < 50; attempt++) {
                    let x = random(2, world.cols - 3) * t + 2;
                    let y = random(2, world.rows - 3) * t + 2;
                    this.x = x;
                    this.y = y;
                    if (!this.collidesWithWorld(world)) {
                        this.targetX = x;
                        this.targetY = y;
                        this.migrate = 0;
                        this.spawn = 1;
                        return true;
                    }
                }
                return false;
            }

            update(world, player) {
                if (this.dead) return;

                if (this.spawn > 0 && this.spawn < 1) {
                    this.spawn += 0.04;
                    if (this.spawn >= 1) this.spawn = 0;
                    return;
                }

                // Расстояние до игрока
                const distToPlayer = dist(this, player);
                let dx = 0,
                    dy = 0;

                if (distToPlayer < this.detectionRadius) {
                    this.state = 'flee';
                    // Убегаем: выбираем случайную точку подальше от игрока
                    // Для простоты двигаемся в направлении от игрока
                    const angle = Math.atan2(this.y - player.y, this.x - player.x);
                    const fleeDist = 200 + Math.random() * 100;
                    let tx = this.x + Math.cos(angle) * fleeDist;
                    let ty = this.y + Math.sin(angle) * fleeDist;
                    const t = this.config.tileSize;
                    const maxX = (world.cols - 1) * t - this.w;
                    const maxY = (world.rows - 1) * t - this.h;
                    tx = clamp(tx, t, maxX);
                    ty = clamp(ty, t, maxY);
                    // Движемся к цели со скоростью убегания
                    const dxT = tx - this.x;
                    const dyT = ty - this.y;
                    const distT = Math.hypot(dxT, dyT);
                    if (distT > 2) {
                        dx = (dxT / distT) * this.fleeSpeed;
                        dy = (dyT / distT) * this.fleeSpeed;
                    }
                } else {
                    this.state = 'idle';
                    // Блуждание
                    this.timer++;
                    if (this.timer > this.wait) {
                        this.timer = 0;
                        this.wait = random(10, 40);
                        let angle = Math.random() * Math.PI * 2;
                        let dist2 = random(40, 150);
                        let tx = this.x + Math.cos(angle) * dist2;
                        let ty = this.y + Math.sin(angle) * dist2;
                        const t = this.config.tileSize;
                        const maxX = (world.cols - 1) * t - this.w;
                        const maxY = (world.rows - 1) * t - this.h;
                        tx = clamp(tx, t, maxX);
                        ty = clamp(ty, t, maxY);
                        this.targetX = tx;
                        this.targetY = ty;
                        this.migrate = random(30, 80);
                    }
                    if (this.migrate > 0) {
                        this.migrate--;
                        let dxT = this.targetX - this.x;
                        let dyT = this.targetY - this.y;
                        let distT = Math.hypot(dxT, dyT);
                        if (distT > 2) {
                            dx = (dxT / distT) * this.speed;
                            dy = (dyT / distT) * this.speed;
                        } else {
                            this.migrate = 0;
                        }
                    }
                }

                if (dx !== 0 || dy !== 0) {
                    this.move(dx, dy, world);
                }

                // Направление для анимации
                if (Math.abs(dx) > Math.abs(dy)) {
                    this.direction = dx > 0 ? 2 : 1;
                } else if (Math.abs(dy) > 0) {
                    this.direction = dy > 0 ? 0 : 3;
                }
            }

            takeDamage(amount) {
                this.hp -= amount;
                if (this.hp <= 0) {
                    this.hp = 0;
                    this.dead = true;
                }
            }
        }

        // ---------- КЛАСС Camera ----------
        class Camera {
            constructor(width, height, config) {
                this.x = 0;
                this.y = 0;
                this.width = width;
                this.height = height;
                this.config = config;
                this.smoothX = 0;
                this.smoothY = 0;
            }

            follow(entity) {
                const targetX = entity.x - this.width / 2 + entity.w / 2;
                const targetY = entity.y - this.height / 2 + entity.h / 2;
                this.smoothX += (targetX - this.smoothX) * 0.1;
                this.smoothY += (targetY - this.smoothY) * 0.1;
                this.x = this.smoothX;
                this.y = this.smoothY;
                const maxX = this.config.cols * this.config.tileSize - this.width;
                const maxY = this.config.rows * this.config.tileSize - this.height;
                this.x = clamp(this.x, 0, maxX);
                this.y = clamp(this.y, 0, maxY);
            }
        }

        // ---------- КЛАСС ParticleSystem ----------
        class ParticleSystem {
            constructor() {
                this.particles = [];
            }

            emitCoinFountain(x, y, count = 30) {
                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = 1 + Math.random() * 4;
                    this.particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1,
                        life: 30 + Math.random() * 25,
                        maxLife: 55,
                        color: '#ffd700',
                        size: 3 + Math.random() * 5,
                        isCoin: true
                    });
                }
            }

            emitExplosion(x, y, color, count = 25) {
                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = 1 + Math.random() * 5;
                    this.particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1,
                        life: 20 + Math.random() * 20,
                        maxLife: 40,
                        color,
                        size: 2 + Math.random() * 6,
                        isCoin: false
                    });
                }
            }

            emitHeal(x, y) {
                for (let i = 0; i < 15; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = 1 + Math.random() * 3;
                    this.particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 0.5,
                        life: 20 + Math.random() * 20,
                        maxLife: 40,
                        color: '#66ff66',
                        size: 3 + Math.random() * 4,
                        isCoin: false
                    });
                }
            }

            update() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.life--;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            clear() { this.particles = []; }
        }

        // ---------- КЛАСС InputManager ----------
        class InputManager {
            constructor() {
                this.keys = {};
                this.up = false;
                this.down = false;
                this.left = false;
                this.right = false;
                this.mouseLeft = false;
                this.space = false;

                window.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    this.updateState();
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.space = true;
                    }
                });
                window.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                    this.updateState();
                    if (e.code === 'Space') this.space = false;
                });

                window.addEventListener('mousedown', (e) => {
                    if (e.button === 0) {
                        this.mouseLeft = true;
                        e.preventDefault();
                    }
                });
                window.addEventListener('mouseup', (e) => {
                    if (e.button === 0) this.mouseLeft = false;
                });
                document.getElementById('gameCanvas').addEventListener('contextmenu', (e) => e.preventDefault());
            }

            updateState() {
                this.up = this.keys['ArrowUp'] || this.keys['KeyW'];
                this.down = this.keys['ArrowDown'] || this.keys['KeyS'];
                this.left = this.keys['ArrowLeft'] || this.keys['KeyA'];
                this.right = this.keys['ArrowRight'] || this.keys['KeyD'];
            }
        }

        // ---------- КЛАСС Renderer ----------
        class Renderer {
            constructor(canvas, config) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.config = config;
                this.W = canvas.width;
                this.H = canvas.height;
                this.resize();
            }

            resize() {
                const winW = window.innerWidth;
                const winH = window.innerHeight;
                const aspect = this.W / this.H;
                let displayWidth, displayHeight;
                if (winW / winH > aspect) {
                    displayHeight = winH - 40;
                    displayWidth = displayHeight * aspect;
                } else {
                    displayWidth = winW - 40;
                    displayHeight = displayWidth / aspect;
                }
                this.canvas.style.width = displayWidth + 'px';
                this.canvas.style.height = displayHeight + 'px';
            }

            clear() {
                const ctx = this.ctx;
                ctx.fillStyle = '#2d2d3f';
                ctx.fillRect(0, 0, this.W, this.H);
                let grad = ctx.createRadialGradient(this.W / 2, 50, 50, this.W / 2, 100, 500);
                grad.addColorStop(0, '#4a6a8a');
                grad.addColorStop(1, '#1a2a3a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, this.W, this.H);
            }

            drawWorld(world, camera) {
                const t = this.config.tileSize;
                const ctx = this.ctx;
                const ox = -camera.x;
                const oy = -camera.y;

                const sc = Math.max(0, Math.floor(camera.x / t));
                const ec = Math.min(world.cols, Math.ceil((camera.x + this.W) / t) + 1);
                const sr = Math.max(0, Math.floor(camera.y / t));
                const er = Math.min(world.rows, Math.ceil((camera.y + this.H) / t) + 1);

                for (let r = sr; r < er; r++) {
                    for (let c = sc; c < ec; c++) {
                        const tile = world.grid[r][c];
                        const x = c * t + ox;
                        const y = r * t + oy;
                        const col = this.config.colors;

                        switch (tile) {
                            case 0:
                                ctx.fillStyle = (r + c) % 2 === 0 ? '#4c8b5a' : '#3d7a4a';
                                ctx.fillRect(x, y, t, t);
                                break;
                            case 1:
                                ctx.fillStyle = '#8b6b4a';
                                ctx.fillRect(x, y, t, t);
                                ctx.fillStyle = '#6b4e3a';
                                ctx.fillRect(x + 2, y + 2, t - 4, t - 4);
                                ctx.fillStyle = '#b8a89a';
                                ctx.fillRect(x + 6, y + 6, 6, 6);
                                ctx.fillRect(x + 20, y + 6, 6, 6);
                                ctx.fillRect(x + 6, y + 20, 6, 6);
                                ctx.fillRect(x + 20, y + 20, 6, 6);
                                break;
                            case 2:
                                ctx.fillStyle = '#9a8a7a';
                                ctx.fillRect(x, y, t, t);
                                ctx.fillStyle = '#7a6a5a';
                                ctx.fillRect(x + 1, y + 1, t - 2, 2);
                                ctx.fillRect(x + 1, y + t - 3, t - 2, 2);
                                break;
                            case 3:
                                ctx.fillStyle = '#3d7a4a';
                                ctx.fillRect(x, y, t, t);
                                const grad = ctx.createRadialGradient(x + 10, y + 8, 3, x + 16, y + 16, 16);
                                grad.addColorStop(0, '#ffff88');
                                grad.addColorStop(0.5, '#ffd700');
                                grad.addColorStop(1, '#b8860b');
                                ctx.fillStyle = grad;
                                ctx.beginPath();
                                ctx.arc(x + t / 2, y + t / 2, 12, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.fillStyle = '#fff8dc';
                                ctx.beginPath();
                                ctx.arc(x + t / 2 - 4, y + t / 2 - 5, 3, 0, Math.PI * 2);
                                ctx.fill();
                                break;
                            case 4:
                                ctx.fillStyle = '#b34a3a';
                                ctx.fillRect(x, y, t, t);
                                ctx.fillStyle = '#8a3a2a';
                                ctx.beginPath();
                                ctx.moveTo(x, y + t);
                                ctx.lineTo(x + t / 2, y);
                                ctx.lineTo(x + t, y + t);
                                ctx.fill();
                                ctx.fillStyle = '#c45a4a';
                                ctx.fillRect(x + 4, y + 4, 4, 4);
                                ctx.fillRect(x + 24, y + 4, 4, 4);
                                break;
                            case 5:
                                ctx.fillStyle = '#3d7a4a';
                                ctx.fillRect(x, y, t, t);
                                ctx.fillStyle = '#6b4e3a';
                                ctx.fillRect(x + 12, y + 16, 8, 16);
                                ctx.fillStyle = '#2d7a3a';
                                ctx.beginPath();
                                ctx.arc(x + 16, y + 12, 14, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.fillStyle = '#3d9a4a';
                                ctx.beginPath();
                                ctx.arc(x + 10, y + 8, 8, 0, Math.PI * 2);
                                ctx.fill();
                                ctx.beginPath();
                                ctx.arc(x + 22, y + 8, 8, 0, Math.PI * 2);
                                ctx.fill();
                                break;
                            case 6:
                                ctx.fillStyle = '#2a7a9a';
                                ctx.fillRect(x, y, t, t);
                                ctx.fillStyle = '#3a9aba';
                                for (let i = 0; i < 3; i++) {
                                    let wx = x + 4 + i * 8 + Math.sin(r * 2 + c * 3 + Date.now() / 1000 + i) * 2;
                                    ctx.fillRect(wx, y + 6 + i * 6, 6, 2);
                                }
                                break;
                            default:
                                ctx.fillStyle = '#3d7a4a';
                                ctx.fillRect(x, y, t, t);
                        }
                    }
                }
            }

            drawEntity(entity, camera, isPlayer = false, isCivilian = false) {
                const ctx = this.ctx;
                const ox = -camera.x;
                const oy = -camera.y;
                const x = entity.x + ox;
                const y = entity.y + oy;
                const w = entity.w;
                const h = entity.h;

                let scale = 1;
                if (entity.spawn > 0 && entity.spawn < 1) {
                    scale = entity.spawn;
                }

                ctx.save();
                ctx.translate(x + w / 2, y + h / 2);
                ctx.scale(scale, scale);

                if (isPlayer) {
                    ctx.shadowColor = 'rgba(74, 138, 196, 0.6)';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#4a8ac4';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#2a5a7a';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#f0f0f0';
                    if (entity.direction === 1) {
                        ctx.beginPath();
                        ctx.arc(-4, -4, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(-4, 4, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#1a2a3a';
                        ctx.beginPath();
                        ctx.arc(-2, -4, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(-2, 4, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (entity.direction === 2) {
                        ctx.beginPath();
                        ctx.arc(4, -4, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, 4, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#1a2a3a';
                        ctx.beginPath();
                        ctx.arc(6, -4, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(6, 4, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (entity.direction === 3) {
                        ctx.beginPath();
                        ctx.arc(-4, -6, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, -6, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#1a2a3a';
                        ctx.beginPath();
                        ctx.arc(-4, -8, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, -8, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(-4, 0, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, 0, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#1a2a3a';
                        ctx.beginPath();
                        ctx.arc(-4, 2, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, 2, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    this.drawSword(ctx, entity, true);
                } else if (isCivilian) {
                    // Мирный житель — зелёный, без меча
                    ctx.shadowColor = 'rgba(102, 187, 106, 0.4)';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#66bb6a';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#2e7d32';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#f0f0f0';
                    if (entity.direction === 1) {
                        ctx.beginPath();
                        ctx.arc(-4, -3, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(-4, 3, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#1a2a1a';
                        ctx.beginPath();
                        ctx.arc(-2, -3, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(-2, 3, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (entity.direction === 2) {
                        ctx.beginPath();
                        ctx.arc(4, -3, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, 3, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#1a2a1a';
                        ctx.beginPath();
                        ctx.arc(6, -3, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(6, 3, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(-4, 0, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, 0, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#1a2a1a';
                        ctx.beginPath();
                        ctx.arc(-4, 2, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4, 2, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    // Враг
                    ctx.shadowColor = 'rgba(196, 74, 74, 0.6)';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#c44a4a';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#8a2a2a';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ffcc00';
                    ctx.beginPath();
                    ctx.arc(-5, -3, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(5, -3, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.arc(-5, -1, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(5, -1, 2, 0, Math.PI * 2);
                    ctx.fill();
                    this.drawSword(ctx, entity, false);
                }

                ctx.restore();
                ctx.shadowBlur = 0;
            }

            drawSword(ctx, entity, isPlayer) {
                const dir = entity.direction;
                let angle = 0;
                let length = 18;
                let offsetX = 0,
                    offsetY = 0;

                switch (dir) {
                    case 0:
                        angle = Math.PI / 2;
                        offsetY = 6;
                        break;
                    case 1:
                        angle = Math.PI;
                        offsetX = -6;
                        break;
                    case 2:
                        angle = 0;
                        offsetX = 6;
                        break;
                    case 3:
                        angle = -Math.PI / 2;
                        offsetY = -6;
                        break;
                }

                let swing = 0;
                if (entity.isAttacking) {
                    const progress = 1 - entity.attackTimer / entity.attackDuration;
                    swing = Math.sin(progress * Math.PI) * 0.8;
                    const startA = angle - 0.6 + swing * 0.3;
                    const endA = angle + 0.6 - swing * 0.3;
                    const radius = length * 1.3;
                    ctx.save();
                    ctx.translate(offsetX, offsetY);
                    ctx.globalAlpha = 0.4;
                    ctx.strokeStyle = isPlayer ? '#aaccff' : '#ff8888';
                    ctx.lineWidth = 6;
                    ctx.shadowColor = isPlayer ? '#88ddff' : '#ff6666';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, startA, endA);
                    ctx.stroke();
                    ctx.globalAlpha = 0.2;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, radius - 4, startA, endA);
                    ctx.stroke();
                    ctx.restore();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }

                angle += swing * 0.5;
                ctx.save();
                ctx.translate(offsetX, offsetY);
                ctx.rotate(angle);
                ctx.fillStyle = '#8b6b4a';
                ctx.fillRect(-2, -2, 4, 8);
                ctx.fillStyle = '#d4af37';
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 8;
                ctx.fillRect(-3, -length + 4, 6, length - 4);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#f0e6d3';
                ctx.beginPath();
                ctx.moveTo(0, -length);
                ctx.lineTo(-4, -length + 6);
                ctx.lineTo(4, -length + 6);
                ctx.fill();
                ctx.restore();
            }

            drawParticles(particles, camera) {
                const ctx = this.ctx;
                const ox = -camera.x;
                const oy = -camera.y;
                for (let p of particles.particles) {
                    let s = p.life / p.maxLife;
                    ctx.globalAlpha = s;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(p.x + ox, p.y + oy, p.size * s * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            drawUI(coinCount, totalCoins, win, winTimer, hp, maxHp) {
                document.getElementById('coinDisplay').textContent = `💰 ${coinCount} / ${totalCoins}`;
                const status = document.getElementById('statusDisplay');
                if (win) {
                    status.textContent = '🎉 ПОБЕДА!';
                    if (winTimer % 30 < 15) status.style.color = '#ffd700';
                    else status.style.color = '#ffaa00';
                } else {
                    status.textContent = '🏰';
                    status.style.color = '#f0e6d3';
                }
                const hpFill = document.getElementById('hpFill');
                const percent = Math.max(0, (hp / maxHp) * 100);
                hpFill.style.width = percent + '%';
                if (percent < 30) hpFill.style.background = '#e74c3c';
                else if (percent < 60) hpFill.style.background = '#f39c12';
                else hpFill.style.background = '#2ecc71';
            }
        }

        // ---------- КЛАСС Game ----------
        class Game {
            constructor(canvas, config = {}) {
                this.config = { ...CONFIG, ...config };
                this.canvas = canvas;
                this.renderer = new Renderer(canvas, this.config);
                this.world = new World(this.config);
                this.player = new Player(this.config);
                this.camera = new Camera(this.renderer.W, this.renderer.H, this.config);
                this.particles = new ParticleSystem();
                this.input = new InputManager();
                this.enemies = [];
                this.civilians = [];
                this.coinCount = 0;
                this.totalCoins = this.config.totalCoins;
                this.win = false;
                this.winTimer = 0;
                this.running = false;
                this.respawnTimer = 0;

                // Глобальные модификаторы
                this.enemyDetectionRadiusMod = 1.0;
                this.enemySpeedMod = 1.0;
                this.enemyCountTarget = this.config.enemyCount;

                this.player._game = this;
                window.addEventListener('resize', () => this.renderer.resize());
                this.generateLevel();
            }

            generateLevel() {
                this.world.generate();
                this.coinCount = 0;
                this.totalCoins = this.config.totalCoins;
                this.win = false;
                this.winTimer = 0;
                this.enemies = [];
                this.civilians = [];
                this.particles.clear();
                this.player.init(this.world);
                this.player.coinCount = 0;
                this.player.hp = this.player.maxHp;
                this.player.dead = false;
                this.respawnTimer = 0;

                // Создание врагов
                for (let i = 0; i < this.enemyCountTarget; i++) {
                    let e = new Enemy(this.config, this.world, this.enemyDetectionRadiusMod, this.enemySpeedMod);
                    e._game = this;
                    this.enemies.push(e);
                }

                // Создание мирных жителей (в 3 раза больше врагов)
                const civilianCount = this.enemyCountTarget * 3;
                for (let i = 0; i < civilianCount; i++) {
                    let c = new Civilian(this.config, this.world);
                    this.civilians.push(c);
                }

                this.particles.emitCoinFountain(this.player.x + this.player.w / 2, this.player.y + this.player.h / 2, 15);
            }

            start() {
                if (this.running) return;
                this.running = true;
                this.loop();
            }

            stop() { this.running = false; }

            loop() {
                if (!this.running) return;
                this.update();
                this.render();
                requestAnimationFrame(() => this.loop());
            }

            update() {
                if (this.win) {
                    this.winTimer++;
                    if (this.winTimer > 120) {
                        this.generateLevel();
                    }
                    this.particles.update();
                    return;
                }

                if (this.player.dead) {
                    this.respawnTimer++;
                    if (this.respawnTimer > 55) {
                        this.generateLevel();
                        this.respawnTimer = 0;
                    }
                    this.particles.update();
                    return;
                }

                // Обновление игрока
                this.player.update(this.input, this.world);

                this.coinCount = this.player.coinCount;
                if (this.coinCount >= this.totalCoins) {
                    this.win = true;
                    this.winTimer = 0;
                    this.particles.emitCoinFountain(this.player.x + this.player.w / 2, this.player.y + this.player.h / 2, 50);
                }

                // Обновление врагов
                for (let e of this.enemies) {
                    if (!e.dead) {
                        e.update(this.world, this.player);
                    }
                }

                // Обновление мирных жителей
                for (let c of this.civilians) {
                    if (!c.dead) {
                        c.update(this.world, this.player);
                    }
                }

                // Коллизия игрока с врагами
                for (let e of this.enemies) {
                    if (e.dead) continue;
                    if (this.player.intersects(e)) {
                        Entity.resolveCollision(this.player, e);
                        const maxX = this.world.cols * this.config.tileSize - this.player.w;
                        const maxY = this.world.rows * this.config.tileSize - this.player.h;
                        this.player.x = clamp(this.player.x, 0, maxX);
                        this.player.y = clamp(this.player.y, 0, maxY);
                        e.x = clamp(e.x, 0, this.world.cols * this.config.tileSize - e.w);
                        e.y = clamp(e.y, 0, this.world.rows * this.config.tileSize - e.h);
                    }
                }

                // Коллизия игрока с гражданскими (просто отталкиваем)
                for (let c of this.civilians) {
                    if (c.dead) continue;
                    if (this.player.intersects(c)) {
                        Entity.resolveCollision(this.player, c);
                        const maxX = this.world.cols * this.config.tileSize - this.player.w;
                        const maxY = this.world.rows * this.config.tileSize - this.player.h;
                        this.player.x = clamp(this.player.x, 0, maxX);
                        this.player.y = clamp(this.player.y, 0, maxY);
                        c.x = clamp(c.x, 0, this.world.cols * this.config.tileSize - c.w);
                        c.y = clamp(c.y, 0, this.world.rows * this.config.tileSize - c.h);
                    }
                }

                // Удаление мёртвых врагов и респавн
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    if (this.enemies[i].dead) {
                        const e = this.enemies[i];
                        this.particles.emitExplosion(e.x + e.w / 2, e.y + e.h / 2, '#c44a4a', 20);
                        this.enemies.splice(i, 1);
                    }
                }
                while (this.enemies.length < this.enemyCountTarget) {
                    let e = new Enemy(this.config, this.world, this.enemyDetectionRadiusMod, this.enemySpeedMod);
                    e._game = this;
                    this.enemies.push(e);
                }

                // Удаление мёртвых гражданских (без респавна)
                for (let i = this.civilians.length - 1; i >= 0; i--) {
                    if (this.civilians[i].dead) {
                        const c = this.civilians[i];
                        this.particles.emitExplosion(c.x + c.w / 2, c.y + c.h / 2, '#66bb6a', 15);
                        this.civilians.splice(i, 1);
                    }
                }

                this.camera.follow(this.player);
                this.particles.update();
            }

            // Обработка атаки игрока
            playerAttack(player) {
                const range = player.attackRange;
                const cx = player.x + player.w / 2;
                const cy = player.y + player.h / 2;

                // Проверка по врагам
                for (let e of this.enemies) {
                    if (e.dead) continue;
                    const ex = e.x + e.w / 2;
                    const ey = e.y + e.h / 2;
                    if (Math.hypot(ex - cx, ey - cy) < range + e.w / 2) {
                        e.takeDamage(player.attackDamage);
                        if (e.dead) {
                            this.particles.emitExplosion(e.x + e.w / 2, e.y + e.h / 2, '#ffaa00', 15);
                        }
                    }
                }

                // Проверка по гражданским
                for (let c of this.civilians) {
                    if (c.dead) continue;
                    const cx2 = c.x + c.w / 2;
                    const cy2 = c.y + c.h / 2;
                    if (Math.hypot(cx2 - cx, cy2 - cy) < range + c.w / 2) {
                        // Убийство гражданского
                        c.takeDamage(player.attackDamage);
                        if (c.dead) {
                            // Восстановление здоровья (1/3 от максимума)
                            const healAmount = Math.ceil(this.player.maxHp / 3);
                            this.player.hp = Math.min(this.player.hp + healAmount, this.player.maxHp);
                            this.particles.emitHeal(this.player.x + this.player.w / 2, this.player.y + this.player.h / 2);
                            this.particles.emitExplosion(c.x + c.w / 2, c.y + c.h / 2, '#66bb6a', 20);

                            // Увеличение числа врагов
                            this.enemyCountTarget += 1;
                            // Увеличение радиуса обнаружения на 5%
                            this.enemyDetectionRadiusMod *= 1.05;
                            // Увеличение скорости блуждания на 10% (приближение к скорости бега)
                            this.enemySpeedMod *= 1.1;
                            // Применяем модификаторы ко всем существующим врагам
                            for (let e of this.enemies) {
                                e.updateModifiers(this.enemyDetectionRadiusMod, this.enemySpeedMod);
                            }
                            // Создаём нового врага сразу
                            let newEnemy = new Enemy(this.config, this.world, this.enemyDetectionRadiusMod, this.enemySpeedMod);
                            newEnemy._game = this;
                            this.enemies.push(newEnemy);
                        }
                    }
                }
            }

            // Обработка атаки врага
            enemyAttack(enemy) {
                if (this.player.dead) return;
                const range = enemy.attackRange;
                const cx = enemy.x + enemy.w / 2;
                const cy = enemy.y + enemy.h / 2;
                const px = this.player.x + this.player.w / 2;
                const py = this.player.y + this.player.h / 2;
                if (Math.hypot(px - cx, py - cy) < range + this.player.w / 2) {
                    this.player.takeDamage(enemy.attackDamage);
                    if (this.player.hp <= 0) {
                        this.player.dead = true;
                        this.particles.emitExplosion(this.player.x + this.player.w / 2, this.player.y + this.player.h / 2,
                            '#4a8ac4', 30);
                    }
                }
            }

            render() {
                const renderer = this.renderer;
                renderer.clear();
                renderer.drawWorld(this.world, this.camera);
                renderer.drawParticles(this.particles, this.camera);

                // Рисуем гражданских
                for (let c of this.civilians) {
                    if (!c.dead) {
                        renderer.drawEntity(c, this.camera, false, true);
                    }
                }

                // Рисуем врагов
                for (let e of this.enemies) {
                    if (!e.dead) {
                        renderer.drawEntity(e, this.camera, false, false);
                    }
                }

                // Рисуем игрока
                if (!this.player.dead) {
                    renderer.drawEntity(this.player, this.camera, true, false);
                }

                renderer.drawUI(this.coinCount, this.totalCoins, this.win, this.winTimer, this.player.hp, this.player.maxHp);
            }

            on(event, callback) {
                if (!this.events[event]) this.events[event] = [];
                this.events[event].push(callback);
            }

            emit(event, ...args) {
                if (this.events[event]) {
                    for (let cb of this.events[event]) cb(...args);
                }
            }
        }

        // ============================================================
        //  ЗАПУСК ИГРЫ
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const game = new Game(canvas);
            game.start();

            game.on('death', () => console.log('Игрок погиб'));
            game.on('win', () => console.log('Победа!'));
        });
    </script>
