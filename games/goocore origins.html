<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Зачем слизням деньги</title>
    <!-- Иконка вкладки: эмодзи денежного мешка -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <!-- Стили: убираем отступы, центрируем холст, задаём тёмный фон и адаптивные размеры -->
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,150,255,0.2);
            width: min(100vw, 100vh * 1.6);
            height: min(100vh, 100vw / 1.6);
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
    // Получаем ссылку на холст и контекст для рисования
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // Внутренние размеры холста (в пикселях)
    let W = 800, H = 500;
    canvas.width = W;
    canvas.height = H;

    // Функция масштабирования холста под размер окна с сохранением пропорций (1.6 : 1)
    function resize() {
        let r = Math.min(window.innerWidth, window.innerHeight * 1.6) / W;
        canvas.style.width = (W * r) + 'px';
        canvas.style.height = (H * r) + 'px';
    }
    window.addEventListener('resize', resize);
    resize(); // вызываем сразу

    // ------------------ ГЛОБАЛЬНЫЕ КОНСТАНТЫ ------------------
    const G = 0.8;      // ускорение свободного падения
    const JUMP = -14;   // начальная скорость прыжка (отрицательная, т.к. вверх)
    const SPEED = 1.2;  // базовая скорость движения игрока
    const MAXV = 9;     // максимальная скорость по горизонтали
    const FRIC = 0.82;  // коэффициент трения (замедление)
    const T = 32;       // размер одного тайла (квадрата) в пикселях
    const COLS = 50;    // количество тайлов по горизонтали
    const ROWS = 30;    // количество тайлов по вертикали

    // ------------------ ИГРОВЫЕ ОБЪЕКТЫ И СОСТОЯНИЯ ------------------
    let world = [];               // двумерный массив мира (0 – пусто, 1 – блок, 3 – монета)
    let player = {                // объект игрока
        x: 1, y: 12,             // координаты (в пикселях)
        vx: 0, vy: 0,            // скорости
        w: 28, h: 28             // размеры (чуть меньше тайла)
    };
    let enemies = [];             // массив врагов
    let cam = { x: 0, y: 0 };     // положение камеры (смещение)
    let keys = {};                // объект для отслеживания нажатых клавиш
    let seed = Date.now();        // зерно для генератора случайных чисел

    let animations = [];          // массив частиц (взрывы, искры)
    let trails = [];              // массив следов (хвосты)
    let playerDead = false;       // флаг смерти игрока
    let respawnTimer = 0;         // счётчик времени до респавна
    let time = 0;                 // глобальное время (для анимаций)
    let exploding = false;        // флаг, чтобы взрыв при смерти происходил только раз
    let coinCount = 0;            // собрано монет
    const totalCoins = 20;        // всего монет на уровне
    let winTimer = 0;             // таймер после победы
    let win = false;              // флаг победы
    let stars = [];               // звёзды, вращающиеся вокруг игрока при победе
    let cheat = false;            // чит-режим (собрать все монеты)
    let winEmoji = 0;             // прогресс появления эмодзи победы

    // ------------------ ГЕНЕРАТОР СЛУЧАЙНЫХ ЧИСЕЛ (LCG) ------------------
    function rng() {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280; // возвращает число от 0 до 1
    }

    // ------------------ ПРОВЕРКА СТОЛКНОВЕНИЙ ------------------
    // Проверяет, пересекается ли прямоугольник (x,y,w,h) с блоками мира или врагами
    // skipEnemy – если true, то враги игнорируются
    function collides(x, y, w, h, skipEnemy) {
        // Определяем диапазон тайлов, которые занимает прямоугольник
        let x1 = Math.floor(x / T);
        let x2 = Math.floor((x + w - 1) / T);
        let y1 = Math.floor(y / T);
        let y2 = Math.floor((y + h - 1) / T);
        // Проверяем каждый тайл в этом диапазоне
        for (let r = y1; r <= y2; r++) {
            for (let c = x1; c <= x2; c++) {
                // Выход за границы мира считается столкновением
                if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
                // Если тайл является блоком (1) – столкновение
                if (world[r][c] === 1) return true;
            }
        }
        // Если не пропускаем врагов, проверяем пересечение с каждым врагом
        if (!skipEnemy) {
            for (let e of enemies) {
                if (x < e.x + e.w && x + w > e.x && y < e.y + e.h && y + h > e.y) {
                    return true;
                }
            }
        }
        return false;
    }

    // ------------------ ПРОВЕРКА, СТОИТ ЛИ ИГРОК НА ПОЛУ ------------------
    function isOnFloor(p) {
        // Проверяем тайлы под ногами (нижняя строка, которую занимает персонаж)
        let x1 = Math.floor(p.x / T);
        let x2 = Math.floor((p.x + p.w - 1) / T);
        let y2 = Math.floor((p.y + p.h - 1) / T);
        for (let r = y2; r <= y2; r++) {
            for (let c = x1; c <= x2; c++) {
                let below = r + 1;
                // Если под ногами есть блок и расстояние до него ≤ 6 пикселей – считаем, что на полу
                if (below < ROWS && world[below][c] === 1 &&
                    p.y + p.h >= below * T && p.y + p.h <= below * T + 6) {
                    return true;
                }
            }
        }
        return false;
    }

    // ------------------ ПРОВЕРКА, КАСАЕТСЯ ЛИ ИГРОК ПОТОЛКА ------------------
    function isOnCeil(p) {
        let x1 = Math.floor(p.x / T);
        let x2 = Math.floor((p.x + p.w - 1) / T);
        let y1 = Math.floor(p.y / T);
        for (let r = y1; r <= y1; r++) {
            for (let c = x1; c <= x2; c++) {
                let above = r - 1;
                // Если сверху есть блок и расстояние до него ≤ 6 пикселей – считаем, что на потолке
                if (above >= 0 && world[above][c] === 1 &&
                    p.y <= above * T + T && p.y >= above * T + T - 6) {
                    return true;
                }
            }
        }
        return false;
    }

    // ------------------ ДОБАВЛЕНИЕ СЛЕДА (ХВОСТА) ------------------
    function addTrail(x, y, color) {
        trails.push({
            x: x,
            y: y,
            life: 40,
            maxLife: 40,
            color: color,
            size: 3 + rng() * 4
        });
    }

    // ------------------ СОЗДАНИЕ НОВОГО ВРАГА ------------------
    function spawnEnemy() {
        // Пытаемся найти свободное место (до 50 попыток)
        for (let a = 0; a < 50; a++) {
            let x = Math.floor(rng() * (COLS - 4)) * T + 2;
            let y = Math.floor(rng() * (ROWS - 6)) * T + 2;
            // Место должно быть свободно от блоков и на расстоянии >150 от игрока
            if (!collides(x, y, 28, 28, true) && Math.hypot(x - player.x, y - player.y) > 150) {
                let ok = true;
                // Также не должно быть близко к другим врагам (дистанция <100)
                for (let e of enemies) {
                    if (Math.hypot(e.x - x, e.y - y) < 100) {
                        ok = false;
                        break;
                    }
                }
                if (ok) {
                    enemies.push({
                        x: x,
                        y: y,
                        w: 28,
                        h: 28,
                        vx: (rng() > 0.5 ? 1 : -1) * (1 + rng() * 2), // случайная начальная скорость
                        vy: 0,
                        timer: 0,                // счётчик для смены поведения
                        wait: Math.floor(rng() * 15) + 5,
                        targetX: x,
                        targetY: y,
                        migrate: 0,              // таймер движения к цели
                        spawn: 1                 // анимация появления (от 1 до 0)
                    });
                    return true;
                }
            }
        }
        return false;
    }

    // ------------------ РАЗМЕЩЕНИЕ ИГРОКА НА УРОВНЕ ------------------
    function spawnPlayer() {
        // Ищем свободную позицию (до 30 попыток)
        for (let a = 0; a < 30; a++) {
            let x = Math.floor(rng() * (COLS - 4)) * T + 2;
            let y = Math.floor(rng() * (ROWS - 6)) * T + 2;
            if (!collides(x, y, 28, 28, true)) {
                player.x = x;
                player.y = y;
                player.vx = 0;
                player.vy = 0;
                player.spawn = 1; // анимация появления
                return true;
            }
        }
        return false;
    }

    // ------------------ СОЗДАНИЕ ВЗРЫВА (ЧАСТИЦ) ------------------
    function addExplosion(x, y, color, count = 35, isCoin = false) {
        for (let i = 0; i < count; i++) {
            let angle = rng() * Math.PI * 2;
            let speed = 1 + rng() * 5;
            animations.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 1,
                life: 30 + rng() * 25,
                maxLife: 55,
                color: color,
                size: isCoin ? 3 + rng() * 5 : 2 + rng() * 6,
                isCoin: isCoin
            });
        }
    }

    // ------------------ ВЗРЫВ МОНЕТ (ПОБЕДНЫЙ ФОНТАН) ------------------
    function addCoinExplosion(x, y) {
        for (let i = 0; i < 60; i++) {
            let angle = rng() * Math.PI * 2;
            let speed = 2 + rng() * 6;
            animations.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 2,
                life: 40 + rng() * 30,
                maxLife: 70,
                color: '#ffdd44',
                size: 3 + rng() * 5,
                isCoin: true
            });
        }
    }

    // ------------------ РИСОВАНИЕ ЗВЕЗДЫ (ДЛЯ ПОБЕДНОЙ АНИМАЦИИ) ------------------
    function drawStar(cx, cy, r, color, rot = 0, spikes = 5) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rot);
        ctx.beginPath();
        for (let i = 0; i < spikes * 2; i++) {
            let rad = i % 2 === 0 ? r : r * 0.4;
            let angle = (i * Math.PI) / spikes - Math.PI / 2;
            ctx.lineTo(Math.cos(angle) * rad, Math.sin(angle) * rad);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
    }

    // ------------------ ГЕНЕРАЦИЯ НОВОГО УРОВНЯ ------------------
    function genLevel() {
        // Заполняем мир нулями
        world = Array(ROWS).fill().map(() => Array(COLS).fill(0));

        // Создаём пол (два нижних ряда блоков)
        for (let x = 0; x < COLS; x++) {
            world[ROWS - 1][x] = 1;
            world[ROWS - 2][x] = 1;
        }

        // Генерируем 90 случайных платформ (прямоугольников)
        for (let i = 0; i < 90; i++) {
            let x = Math.floor(rng() * (COLS - 4)) + 2;
            let y = Math.floor(rng() * (ROWS - 6)) + 2;
            let w = Math.floor(rng() * 3) + 2; // ширина 2-4
            let h = Math.floor(rng() * 2) + 1; // высота 1-2
            if (y + h < ROWS - 2 && x + w < COLS) {
                for (let dy = 0; dy < h; dy++) {
                    for (let dx = 0; dx < w; dx++) {
                        world[y + dy][x + dx] = 1;
                    }
                }
            }
        }

        // Сброс счётчиков
        coinCount = 0;
        win = false;
        winTimer = 0;
        winEmoji = 0;

        // Размещаем монеты (значение 3) в случайных пустых ячейках
        for (let i = 0; i < totalCoins; i++) {
            let x = Math.floor(rng() * (COLS - 2)) + 1;
            let y = Math.floor(rng() * (ROWS - 5)) + 2;
            if (world[y][x] === 0) {
                world[y][x] = 3;
            } else {
                i--; // если место занято, пробуем ещё раз
            }
        }

        // Очищаем врагов, анимации, следы
        enemies = [];
        animations = [];
        trails = [];
        playerDead = false;
        respawnTimer = 0;
        exploding = false;

        // Создаём 10 врагов
        for (let i = 0; i < 10; i++) spawnEnemy();

        // Помещаем игрока; если не удалось – ставим в угол
        if (!spawnPlayer()) {
            player.x = 32;
            player.y = ROWS * T - 64;
        }

        // Добавляем декоративные частицы для фона (40 штук)
        for (let i = 0; i < 40; i++) {
            let a = Math.random() * W;
            let b = Math.random() * H;
            animations.push({
                x: a,
                y: b,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4 - 2,
                life: 20 + Math.random() * 30,
                maxLife: 50,
                color: `hsl(${Math.random() * 60 + 200}, 70%, 60%)`,
                size: 2 + Math.random() * 4,
                isCoin: false
            });
        }
    }

    // ------------------ ОБНОВЛЕНИЕ СОСТОЯНИЯ ОДНОГО ВРАГА ------------------
    function updateEnemy(e) {
        // Анимация появления (уменьшение spawn от 1 до 0)
        if (e.spawn) {
            e.spawn += 0.035;
            if (e.spawn > 1) e.spawn = 0;
            return;
        }

        e.timer++;
        // Если таймер достиг порога, выбираем новую цель
        if (e.timer > e.wait) {
            e.timer = 0;
            e.wait = Math.floor(rng() * 15) + 5;

            // Случайная целевая точка в пределах уровня
            let dx = (Math.floor(rng() * COLS) - e.x / T) * T;
            let dy = (Math.floor(rng() * ROWS) - e.y / T) * T;
            let len = Math.sqrt(dx * dx + dy * dy) || 1;
            e.targetX = e.x + (dx / len) * Math.min(250, 40 + rng() * 100);
            e.targetY = e.y + (dy / len) * Math.min(200, 30 + rng() * 80);
            e.migrate = 40 + rng() * 50;
            // Шанс подпрыгнуть, если стоит на месте
            if (rng() > 0.2 && e.vy === 0) e.vy = -8 - rng() * 4;
        }

        // Движение к цели
        if (e.migrate > 0) {
            e.migrate--;
            let dx = e.targetX - e.x;
            let dy = e.targetY - e.y;
            let dist = Math.sqrt(dx * dx + dy * dy) || 1;
            let spd = 1.5 + rng() * 1.5;
            let acc = 0.3;
            e.vx += (dx / dist) * spd * acc;
            e.vx *= 0.92; // небольшое торможение
            // Если почти достигли по горизонтали – сбрасываем migrate
            if (Math.abs(dx) < 6) {
                e.vx *= 0.8;
                e.migrate = 0;
            }
            // Если почти достигли по вертикали и стоим на полу – прыгаем
            if (Math.abs(dy) < 10 && e.vy === 0) {
                e.vy = -8 - rng() * 4;
            }
        } else {
            // Если migrate закончился, задаём новую случайную цель (более короткую)
            let dx = (Math.floor(rng() * COLS) - e.x / T) * T;
            let dy = (Math.floor(rng() * ROWS) - e.y / T) * T;
            let len = Math.sqrt(dx * dx + dy * dy) || 1;
            e.targetX = e.x + (dx / len) * Math.min(200, 30 + rng() * 70);
            e.targetY = e.y + (dy / len) * Math.min(150, 20 + rng() * 60);
            e.migrate = 30 + rng() * 30;
        }

        // Ограничение скорости
        e.vx = Math.max(-MAXV, Math.min(MAXV, e.vx));

        // Движение по X с проверкой коллизий
        e.x += e.vx;
        if (collides(e.x, e.y, e.w, e.h, true) || e.x < 0 || e.x + e.w > COLS * T) {
            e.x -= e.vx;
            e.vx *= -0.5;
        }

        // Движение по Y с гравитацией
        e.vy += G;
        e.y += e.vy;
        if (collides(e.x, e.y, e.w, e.h, true) || e.y + e.h > ROWS * T) {
            e.y -= e.vy;
            e.vy = 0;
        }

        // Принудительное удержание в пределах уровня
        if (e.y + e.h > ROWS * T) { e.y = ROWS * T - e.h; e.vy = 0; }
        if (e.x < 0) e.x = 0;
        if (e.x + e.w > COLS * T) e.x = COLS * T - e.w;

        // Добавляем след, если двигается достаточно быстро
        if (Math.abs(e.vx) > 0.3 || Math.abs(e.vy) > 0.3) {
            if (rng() < 0.3) addTrail(e.x + e.w / 2, e.y + e.h / 2, '#ff6644');
        }
    }

    // ------------------ ГЛАВНАЯ ФУНКЦИЯ ОБНОВЛЕНИЯ (ВЫЗЫВАЕТСЯ КАЖДЫЙ КАДР) ------------------
    function update() {
        time += 0.005; // увеличиваем глобальное время

        // Обработка чита (Shift+P) – моментальный сбор всех монет
        if (cheat) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (world[r][c] === 3) {
                        world[r][c] = 0;
                        coinCount++;
                    }
                }
            }
            cheat = false;
            if (coinCount >= totalCoins) {
                win = true;
                winTimer = 0;
                winEmoji = 0;
            }
        }

        // ------------------ СОСТОЯНИЕ ПОБЕДЫ ------------------
        if (win) {
            winTimer++;
            // При начале победы – взрыв монет
            if (winTimer === 1) {
                addCoinExplosion(player.x + player.w / 2, player.y + player.h / 2);
                winEmoji = 0;
            }
            // Через 120 кадров (≈2 сек) создаём новую звезду и перегенерируем уровень
            if (winTimer > 120) {
                stars.push({ angle: 0, phase: Math.random() * 6.28 });
                genLevel();
            }
            // Плавное появление эмодзи победы (с 20 по 120 кадр)
            if (winTimer > 20 && winTimer < 120) {
                winEmoji = Math.min(1, (winTimer - 20) / 30);
            }
            // Обновляем анимации и следы даже в состоянии победы
            for (let i = animations.length - 1; i >= 0; i--) {
                let a = animations[i];
                a.x += a.vx;
                a.y += a.vy;
                a.vy += 0.05;
                a.life--;
                if (a.life <= 0) animations.splice(i, 1);
            }
            for (let i = trails.length - 1; i >= 0; i--) {
                let t = trails[i];
                t.life--;
                if (t.life <= 0) trails.splice(i, 1);
            }
            return; // выходим, чтобы не обрабатывать остальное
        }

        // ------------------ СОСТОЯНИЕ СМЕРТИ ИГРОКА ------------------
        if (playerDead) {
            // Создаём взрыв только один раз
            if (!exploding) {
                addExplosion(player.x + player.w / 2, player.y + player.h / 2, '#2ecc71', 40);
                exploding = true;
            }
            respawnTimer++;
            // Через 55 кадров (~0.9 сек) перегенерируем уровень
            if (respawnTimer > 55) {
                genLevel();
            }
            // Обновляем анимации и следы
            for (let i = animations.length - 1; i >= 0; i--) {
                let a = animations[i];
                a.x += a.vx;
                a.y += a.vy;
                a.vy += 0.08;
                a.life--;
                if (a.life <= 0) animations.splice(i, 1);
            }
            for (let i = trails.length - 1; i >= 0; i--) {
                let t = trails[i];
                t.life--;
                if (t.life <= 0) trails.splice(i, 1);
            }
            return;
        }

        // ------------------ АНИМАЦИЯ ПОЯВЛЕНИЯ ИГРОКА ------------------
        if (player.spawn) {
            player.spawn += 0.035;
            if (player.spawn > 1) player.spawn = 0;
        }

        let p = player;

        // ------------------ УПРАВЛЕНИЕ ИГРОКОМ ------------------
        let acc = 0;
        if (keys['ArrowLeft'] || keys['KeyA']) acc = -SPEED;
        if (keys['ArrowRight'] || keys['KeyD']) acc = SPEED;
        p.vx += acc;
        p.vx *= FRIC; // трение

        // Ограничение скорости
        if (Math.abs(p.vx) > MAXV) p.vx = MAXV * Math.sign(p.vx);
        if (Math.abs(p.vx) < 0.05) p.vx = 0;

        // Движение по X с коллизией
        p.x += p.vx;
        if (collides(p.x, p.y, p.w, p.h, false)) {
            p.x -= p.vx;
            p.vx = 0;
        }

        // Гравитация и движение по Y
        p.vy += G;
        p.y += p.vy;
        if (collides(p.x, p.y, p.w, p.h, false)) {
            if (p.vy > 0) { // падение
                p.y = Math.floor((p.y + p.h) / T) * T - p.h;
                p.vy = 0;
            } else if (p.vy < 0) { // подъём (столкновение с потолком)
                p.y = Math.floor(p.y / T) * T + T;
                p.vy = 0;
            }
        }

        // Прыжок, если нажата клавиша и персонаж на полу или потолке
        if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && (isOnFloor(p) || isOnCeil(p))) {
            p.vy = JUMP - Math.min(0, p.vx * 0.15); // небольшой бонус при движении в сторону
        }

        // Удержание в пределах уровня
        if (p.x < 0) p.x = 0;
        if (p.x + p.w > COLS * T) p.x = COLS * T - p.w;
        if (p.y < 0) p.y = 0;

        // Падение в бездну (ниже уровня) → смерть
        if (p.y + p.h > ROWS * T) {
            playerDead = true;
            exploding = false;
            respawnTimer = 0;
            return;
        }

        // Добавляем след при быстром движении
        if (Math.abs(p.vx) > 0.5 || Math.abs(p.vy) > 0.5) {
            if (rng() < 0.2) addTrail(p.x + p.w / 2, p.y + p.h / 2, '#6ef0a0');
        }

        // ------------------ СБОР МОНЕТ ------------------
        let cx = Math.floor((p.x + p.w / 2) / T);
        let cy = Math.floor((p.y + p.h / 2) / T);
        if (cx >= 0 && cx < COLS && cy >= 0 && cy < ROWS && world[cy][cx] === 3) {
            world[cy][cx] = 0;
            coinCount++;
            if (coinCount >= totalCoins) {
                win = true;
                winTimer = 0;
                winEmoji = 0;
            }
        }

        // ------------------ ОБНОВЛЕНИЕ ВРАГОВ И ПРОВЕРКА СТОЛКНОВЕНИЙ С ИГРОКОМ ------------------
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            updateEnemy(e);
            // Если враг не в анимации появления и коснулся игрока – смерть
            if (!e.spawn && p.x < e.x + e.w && p.x + p.w > e.x &&
                p.y < e.y + e.h && p.y + p.h > e.y) {
                playerDead = true;
                exploding = false;
                respawnTimer = 0;
                return;
            }
        }

        // ------------------ СТОЛКНОВЕНИЯ ВРАГОВ ДРУГ С ДРУГОМ (ВЗРЫВ) ------------------
        for (let i = enemies.length - 1; i >= 0; i--) {
            for (let j = i - 1; j >= 0; j--) {
                let a = enemies[i];
                let b = enemies[j];
                if (!a.spawn && !b.spawn &&
                    a.x < b.x + b.w && a.x + a.w > b.x &&
                    a.y < b.y + b.h && a.y + a.h > b.y) {
                    // Взрываем обоих
                    addExplosion(a.x + a.w / 2, a.y + a.h / 2, '#ff4444');
                    addExplosion(b.x + b.w / 2, b.y + b.h / 2, '#ff4444');
                    enemies.splice(i, 1);
                    enemies.splice(j, 1);
                    // Создаём двух новых врагов взамен
                    for (let k = 0; k < 2; k++) spawnEnemy();
                    break;
                }
            }
        }

        // Поддерживаем количество врагов не менее 10
        while (enemies.length < 10) spawnEnemy();

        // ------------------ ОБНОВЛЕНИЕ КАМЕРЫ ------------------
        cam.x = p.x - W / 2;
        cam.y = p.y - H / 2;
        cam.x = Math.max(0, Math.min(cam.x, COLS * T - W));
        cam.y = Math.max(0, Math.min(cam.y, ROWS * T - H));

        // ------------------ ОБНОВЛЕНИЕ АНИМАЦИЙ И СЛЕДОВ ------------------
        for (let i = animations.length - 1; i >= 0; i--) {
            let a = animations[i];
            a.x += a.vx;
            a.y += a.vy;
            a.vy += 0.08;
            a.life--;
            if (a.life <= 0) animations.splice(i, 1);
        }
        for (let i = trails.length - 1; i >= 0; i--) {
            let t = trails[i];
            t.life--;
            if (t.life <= 0) trails.splice(i, 1);
        }

        // Вращаем звёзды (если есть)
        for (let s of stars) {
            s.angle += 0.04;
            s.phase += 0.02;
        }
    }

    // ------------------ РИСОВАНИЕ СЛИЗНЯ (ИГРОК ИЛИ ВРАГ) ------------------
    function drawSlime(x, y, w, h, state, isPlayer, spawn) {
        let cx = x + w / 2;
        let cy = y + h / 2;
        let rad = w / 2;

        // Анимация появления (уменьшение размера и прозрачности)
        if (spawn && spawn < 1) {
            let s = spawn;
            rad *= s;
            if (s < 0.3) ctx.globalAlpha = s / 0.3;
            else ctx.globalAlpha = 1;
        }

        ctx.save();

        // Градиент для тела
        let grad = ctx.createRadialGradient(cx - 4, cy - 4, 2, cx, cy, rad);
        if (isPlayer) {
            if (state === 1) { // на полу
                grad.addColorStop(0, '#7dffb3');
                grad.addColorStop(1, '#1b8a4a');
            } else if (state === 2) { // на потолке
                grad.addColorStop(0, '#6ef0a0');
                grad.addColorStop(1, '#0f6b38');
            } else { // в воздухе
                grad.addColorStop(0, '#a0ffcc');
                grad.addColorStop(1, '#2ecc71');
            }
        } else { // враг
            if (state === 1) { // на полу
                grad.addColorStop(0, '#ff6666');
                grad.addColorStop(1, '#cc0000');
            } else {
                grad.addColorStop(0, '#ff5555');
                grad.addColorStop(1, '#cc1111');
            }
        }

        ctx.shadowColor = isPlayer ? 'rgba(46,204,113,0.5)' : 'rgba(255,0,0,0.5)';
        ctx.shadowBlur = 20;

        // Форма слизня (эллипс) в зависимости от состояния
        ctx.beginPath();
        if (state === 1) { // на полу – сплюснут снизу
            ctx.ellipse(cx, cy + rad * 0.2, rad * 0.9, rad * 0.7, 0, 0, Math.PI * 2);
        } else if (state === 2) { // на потолке – сплюснут сверху
            ctx.ellipse(cx, cy - rad * 0.2, rad * 0.9, rad * 0.7, 0, 0, Math.PI * 2);
        } else { // в воздухе – почти круглый
            ctx.ellipse(cx, cy, rad, rad * 0.9, 0, 0, Math.PI * 2);
        }
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = isPlayer ? '#1a6e3a' : '#8e0000';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Глаза
        if (isPlayer && !spawn) {
            // Игрок: ищем ближайшую монету, чтобы глаза смотрели на неё
            let coin = null;
            let bd = Infinity;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (world[r][c] === 3) {
                        let dx = c * T + 16 - (player.x + 14);
                        let dy = r * T + 16 - (player.y + 14);
                        let d = dx * dx + dy * dy;
                        if (d < bd) { bd = d; coin = { x: c * T + 16, y: r * T + 16 }; }
                    }
                }
            }
            if (coin) {
                let dx = coin.x - (player.x + 14);
                let dy = coin.y - (player.y + 14);
                let ang = Math.atan2(dy, dx);
                // Позиции двух глаз
                let ex1 = cx - 4 + Math.cos(ang) * 4;
                let ey1 = cy - 4 + Math.sin(ang) * 4;
                let ex2 = cx + 4 + Math.cos(ang) * 4;
                let ey2 = cy - 4 + Math.sin(ang) * 4;
                // Белки
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(ex1, ey1, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, 5, 0, Math.PI * 2);
                ctx.fill();
                // Зрачки (смещены в сторону монеты)
                ctx.fillStyle = '#1a2a1a';
                ctx.beginPath();
                ctx.arc(ex1 + Math.cos(ang) * 2, ey1 + Math.sin(ang) * 2, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2 + Math.cos(ang) * 2, ey2 + Math.sin(ang) * 2, 2.5, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Если монет нет – глаза смотрят прямо
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(cx - 5, cy - 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 5, cy - 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#1a2a1a';
                ctx.beginPath();
                ctx.arc(cx - 4, cy - 2, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 6, cy - 2, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
            // Блик на теле
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.ellipse(cx - 4, cy - 6, 6, 4, 0, 0, Math.PI * 2);
            ctx.fill();
        } else if (!isPlayer && !spawn) {
            // Враг: красные глаза с чёрными зрачками
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(cx - 6, cy - 5, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 6, cy - 5, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2a1a1a';
            ctx.beginPath();
            ctx.arc(cx - 5, cy - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + 7, cy - 3, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
        ctx.globalAlpha = 1;
    }

    // ------------------ ОТРИСОВКА ВСЕГО ЭКРАНА ------------------
    function draw() {
        let t = time;

        // Фон – тёмно-синий с плавно меняющимся радиальным градиентом
        ctx.fillStyle = '#0f0f2a';
        ctx.fillRect(0, 0, W, H);

        let grad = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, 700);
        // Вычисляем цвета с использованием синусоид
        let r1 = 0.1 + Math.sin(t * 0.3) * 0.05;
        let g1 = 0.1 + Math.sin(t * 0.4 + 1) * 0.05;
        let b1 = 0.25 + Math.sin(t * 0.25 + 2) * 0.1;
        let r2 = 0.02 + Math.sin(t * 0.2 + 0.5) * 0.02;
        let g2 = 0.02 + Math.sin(t * 0.35 + 1.5) * 0.02;
        let b2 = 0.08 + Math.sin(t * 0.45 + 2.5) * 0.04;
        grad.addColorStop(0, `rgb(${r1 * 255},${g1 * 255},${b1 * 255})`);
        grad.addColorStop(1, `rgb(${r2 * 255},${g2 * 255},${b2 * 255})`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Смещение камеры
        let ox = -cam.x;
        let oy = -cam.y;

        // Определяем видимые тайлы (для оптимизации)
        let sc = Math.max(0, Math.floor(cam.x / T));
        let ec = Math.min(COLS, Math.ceil((cam.x + W) / T) + 1);
        let sr = Math.max(0, Math.floor(cam.y / T));
        let er = Math.min(ROWS, Math.ceil((cam.y + H) / T) + 1);

        // Отрисовка тайлов
        for (let r = sr; r < er; r++) {
            for (let c = sc; c < ec; c++) {
                let v = world[r][c];
                let x = c * T + ox;
                let y = r * T + oy;
                if (v === 1) { // блок
                    let hue = 210 + Math.sin(t * 0.2 + r * 0.1 + c * 0.15) * 15;
                    let g = ctx.createRadialGradient(x + 4, y + 4, 2, x + 16, y + 16, 22);
                    g.addColorStop(0, `hsl(${hue + 10}, 60%, 55%)`);
                    g.addColorStop(1, `hsl(${hue - 10}, 50%, 30%)`);
                    ctx.fillStyle = g;
                    ctx.shadowColor = `hsl(${hue}, 50%, 40%)`;
                    ctx.shadowBlur = 12;
                    ctx.fillRect(x, y, T, T);
                    ctx.shadowBlur = 0;
                    // Блик сверху
                    ctx.fillStyle = `hsla(${hue + 20}, 70%, 70%, 0.5)`;
                    ctx.fillRect(x + 2, y + 2, T - 4, 3);
                } else if (v === 3) { // монета
                    let g = ctx.createRadialGradient(x + 6, y + 4, 3, x + 16, y + 16, 18);
                    g.addColorStop(0, '#ffff88');
                    g.addColorStop(0.3, '#ffdd44');
                    g.addColorStop(0.7, '#ffaa00');
                    g.addColorStop(1, '#cc8800');
                    ctx.fillStyle = g;
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(x + T / 2, y + T / 2, 13, 0, Math.PI * 2);
                    ctx.fill();
                    // Блик на монете
                    ctx.fillStyle = '#ffffaa';
                    ctx.beginPath();
                    ctx.arc(x + T / 2 - 5, y + T / 2 - 6, 3.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#cc8800';
                    ctx.beginPath();
                    ctx.arc(x + T / 2 + 4, y + T / 2 + 3, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,200,0.4)';
                    ctx.beginPath();
                    ctx.arc(x + T / 2 - 7, y + T / 2 - 9, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Отрисовка следов
        for (let t of trails) {
            let s = t.life / t.maxLife;
            ctx.globalAlpha = s * 0.6;
            ctx.fillStyle = t.color;
            ctx.shadowColor = t.color;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(t.x + ox, t.y + oy, t.size * s * 0.8, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        // Отрисовка анимаций (частиц)
        for (let a of animations) {
            let s = a.life / a.maxLife;
            ctx.globalAlpha = s;
            ctx.fillStyle = a.color;
            ctx.shadowColor = a.color;
            ctx.shadowBlur = a.isCoin ? 25 : 18;
            ctx.beginPath();
            if (a.isCoin) {
                ctx.arc(a.x + ox, a.y + oy, a.size * s * 1.5, 0, Math.PI * 2);
            } else {
                ctx.arc(a.x + ox, a.y + oy, a.size * s * 1.2, 0, Math.PI * 2);
            }
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        // Отрисовка врагов
        for (let e of enemies) {
            let state = (e.vy === 0 && e.y + e.h >= Math.floor(e.y / T) * T + T - 2) ? 1 : 3;
            drawSlime(e.x + ox, e.y + oy, e.w, e.h, state, false, e.spawn);
        }

        // Отрисовка игрока, если он жив и не победа
        if (!playerDead && !win) {
            let p = player;
            let onFloor = isOnFloor(p);
            let onCeil = isOnCeil(p);
            let state = 3;
            if (onFloor) state = 1;
            else if (onCeil) state = 2;
            drawSlime(p.x + ox, p.y + oy, p.w, p.h, state, true, p.spawn);
        }

        // Отрисовка звёзд (при победе)
        for (let s of stars) {
            let angle = s.angle + time * 0.7;
            let rad = 40 + Math.sin(time * 0.5 + s.phase) * 12;
            let sx = player.x + ox + Math.cos(angle) * rad + Math.sin(time * 0.4 + s.phase) * 8;
            let sy = player.y + oy + 10 + Math.sin(angle * 0.8 + time) * rad * 0.4 + Math.cos(time * 0.3 + s.phase) * 10;
            drawStar(sx, sy, 8 + Math.sin(time * 2 + s.phase) * 1.5, '#ffdd44', time + s.angle);
        }

        // Счётчик монет
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '14px monospace';
        ctx.fillText(`💰 ${coinCount}/${totalCoins}`, 12, 24);

        // Эмодзи победы (появляется после сбора всех монет)
        if (win && winTimer > 20 && winTimer < 120) {
            let s = winEmoji;
            let sc = 1 + s * 0.3;
            ctx.save();
            ctx.translate(W / 2, H / 2 - 10);
            ctx.scale(sc, sc);
            ctx.globalAlpha = s;
            ctx.font = '80px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ffdd44';
            ctx.shadowBlur = 60;
            ctx.fillText('🎉', 0, 0);
            ctx.restore();
        }
    }

    // ------------------ ИГРОВОЙ ЦИКЛ ------------------
    let frames = 0;
    function loop() {
        frames++;
        update(); // обновление состояния
        draw();    // отрисовка
        requestAnimationFrame(loop);
    }

    // ------------------ ЗАПУСК ИГРЫ ------------------
    genLevel();  // создаём начальный уровень
    loop();      // запускаем цикл

    // ------------------ ОБРАБОТЧИКИ КЛАВИАТУРЫ ------------------
    document.addEventListener('keydown', e => {
        keys[e.code] = true;
        // Чит: Shift + P – собрать все монеты
        if (e.shiftKey && e.code === 'KeyP') {
            cheat = true;
        }
    });
    document.addEventListener('keyup', e => {
        keys[e.code] = false;
    });
</script>
</body>
